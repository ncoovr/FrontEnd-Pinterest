<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="coms.css">
    <title>Comentarios</title>
</head>
<body>
    <main class="comments-container">
        <header class="comments-header">
            <h2>Comentarios</h2>
            <span class="comments-count">2 comentarios</span>
        </header>
        <section class="comments-list">
            <article class="comment-item">
                <figure class="user-avatar">
                    <span role="img" aria-label="Avatar de usuario">🏌️</span>
                </figure>
                <div class="comment-content">
                    <h3>Juan Báez</h3>
                    <p>Buena imagen, pero que tal si publican como reparar un skoda que esta casi dañado?</p>
                    <time datetime="2026-05-23">Hace 1 día</time>
                </div> 
            </article>

            <article class="comment-item">
                <figure class="user-avatar">
                    <span role="img" aria-label="Avatar de usuario">👤</span>
                </figure>
                <div class="comment-content">
                    <h3>Steven Cazar</h3>
                    <p>Hola acá se puede poner omfg?</p>
                    <time datetime="2026-05-24">Hace 20 min</time>
                </div>
            </article>
        </section>
        
        <footer class="add-comment-section">
            <form action="#" class="comment-form">
                <figure class="current-user-avatar">
                    <span role="img" aria-label="Tu Avatar">🐐</span>
                </figure>
                <div class="input-wrapper">
                    <textarea placeholder="Agrega un comentario" rows="2" required></textarea>
                    <button type="submit" class="btn-send-comment">Enviar</button>
                </div>
            </form>
        </footer>
    </main>
</body>
</html>
