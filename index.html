<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinterest</title>
    <link rel="stylesheet" href="assets/style.css">
    <link rel="icon" type="image/webp" href="assets/img/pinterest.webp">
</head>
<body>
    <header class="encabezado">
        <nav class="navegacion-superior">
            <a href="index.html" class="logo">
                <img src="assets/img/pinterest.webp" alt="Logo de Pinterest" class="imagen-logo">
                <span class="texto-logo">Pinterest</span>
            </a>
            
            <menu class="menu-derecho">
                <span class="icono-nav">&#8230;</span>
                <a href="profile.html">
                    <img src="assets/img/avatar.jpg" alt="Perfil" class="avatar-nav">
                </a>
            </menu>
        </nav>

        <nav class="navegacion-central">
            <a href="#" class="activo">Inicio</a>
            <a href="#">Videos</a>
            <a href="#">Galería</a>
            <a href="profile.html">Perfil</a>
        </nav>
    </header>
     <main>
        <section class="seccion-hero">
            <article class="contenido-hero">
                <h1>Las mejores fotos de stock gratis, imágenes libres de derechos y videos compartidos por creadores.</h1>
                
                <form class="barra-busqueda">
                    <input type="text" placeholder="Busca lo que gustes..">
                    <button type="submit" class="boton-busqueda">&#128269;</button>
                </form>
            </article>
        </section>

        <section class="seccion-tendencias">
            <header class="cabecera-tendencias">
                <h2>Galería</h2>
                <button class="boton-tendencia">Categorías &#9662;</button>
            </header>
            
            <nav class="contenedor-etiquetas">
                <button class="etiqueta"><span class="imagen-etiqueta" style="background-image: url('https://images.pexels.com/photos/9329047/pexels-photo-9329047.jpeg?auto=compress&cs=tinysrgb&w=100');"></span> Besucon <span>15.4K</span></button>
                <button class="etiqueta"><span class="imagen-etiqueta" style="background-image: url('https://images.pexels.com/photos/9221307/pexels-photo-9221307.jpeg?auto=compress&cs=tinysrgb&w=100');"></span> Tigre  <span>503.3K</span></button>
                <button class="etiqueta"><span class="imagen-etiqueta" style="background-image: url('https://images.pexels.com/photos/1666667/pexels-photo-1666667.jpeg?auto=compress&cs=tinysrgb&w=100');"></span> Cachorra <span>240.8K</span></button>
                <button class="etiqueta"><span class="imagen-etiqueta" style="background-image: url('https://images.pexels.com/photos/36770103/pexels-photo-36770103.jpeg?auto=compress&cs=tinysrgb&w=100');"></span> Chonerito <span>1.7M</span></button>
                <button class="etiqueta"><span class="imagen-etiqueta" style="background-image: url('https://images.pexels.com/photos/30150825/pexels-photo-30150825.jpeg?auto=compress&cs=tinysrgb&w=100');"></span> Flaquito <span>410.7K</span></button>
            </nav>
        </section>

        <section class="cuadricula-galeria">
            <img src="https://images.pexels.com/photos/9329047/pexels-photo-9329047.jpeg?auto=compress&cs=tinysrgb&w=600" alt="Galería">
            <img src="https://images.pexels.com/photos/9221307/pexels-photo-9221307.jpeg?auto=compress&cs=tinysrgb&w=600" alt="Galería">
            <img src="https://images.pexels.com/photos/1666667/pexels-photo-1666667.jpeg?auto=compress&cs=tinysrgb&w=600" alt="Galería">
            <img src="https://images.pexels.com/photos/36770103/pexels-photo-36770103.jpeg?auto=compress&cs=tinysrgb&w=600" alt="Galería">
            <img src="https://images.pexels.com/photos/30150825/pexels-photo-30150825.jpeg?auto=compress&cs=tinysrgb&w=600" alt="Galería">
            <img src="https://images.pexels.com/photos/35719467/pexels-photo-35719467.jpeg?auto=compress&cs=tinysrgb&w=600" alt="Galería">
            <img src="https://images.pexels.com/photos/15988007/pexels-photo-15988007.jpeg?auto=compress&cs=tinysrgb&w=600" alt="Galería">
            <img src="https://images.pexels.com/photos/12379827/pexels-photo-12379827.jpeg?auto=compress&cs=tinysrgb&w=600" alt="Galería">
            <img src="https://images.pexels.com/photos/3724836/pexels-photo-3724836.jpeg?auto=compress&cs=tinysrgb&w=600" alt="Galería">
            <img src="https://images.pexels.com/photos/15320566/pexels-photo-15320566.jpeg?auto=compress&cs=tinysrgb&w=600" alt="Galería">
            <img src="https://images.pexels.com/photos/35101544/pexels-photo-35101544.jpeg?auto=compress&cs=tinysrgb&w=600" alt="Galería">
            <img src="https://images.pexels.com/photos/7513474/pexels-photo-7513474.jpeg?auto=compress&cs=tinysrgb&w=600" alt="Galería">
        </section>
    </main>
</body>
</html>
