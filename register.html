<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="reg.css">
    <title>Registro</title>
</head>
<body>
    <main class="container">
        <header class="header-brand">
            <figure class="logo">
                <span role="img" aria-label="Logo Pinterest">🐐</span>
            </figure>
            <h1>Te damos la bienvenida a esta web page</h1>
            <p>Encuentra nuevas ideas para experimentar</p>
        </header>

        <form action="#">

            <div class="form-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" placeholder="Correo electrónico" required>
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Crea una contraseña" required>
                    <button type="button" class="toggle-password" aria-label="Mostrar u ocultar contraseña">👁️</button>
                </div>
                <small class="helper-text">Usa ocho o más letras, números y símbolos</small>
            </div>
            <div class="form-group">
                <label for="birthdate">Fecha de nacimiento</label>
                <input type="date" id="birthdate" required>
            </div>
            <button type="submit" class="btn-submit">Continuar</button>
        </form>
        <footer class="form-footer">
            <p class="login-redirect">
                ¿Ya eres miembro? <a href="login.html">Iniciar sesión</a>
            </p>
        </footer>
    </main>
</body>
</html>
