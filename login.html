<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="log.css">
    <title>Iniciar sesión</title>
</head>
<body>
    <main class="login-container">
        <header class="header-brand">
            <figure class="logo">
                <span role="img" aria-label="Logo Pinterest">🐐</span>
            </figure>
            <h1>Te damos la bienvenida a esta web page</h1>
            <p>Introduce tus credenciales para ingresar</p>
        </header>
        <form action="#">
            <div class="form-group">
                <label for="login-email">Correo Electrónico</label>
                <input type="email" id="login-email" placeholder="Correo Electrónico" required>
            </div>
            <div class="form-group">
                <label for="login-password">Contraseña</label>
                <div class="password-wrapper">
                    <input type="password" id="login-password" placeholder="Introduce tu contraseña" required>
                    <button type="button" class="toggle-password" aria-label="Mostrar u ocultar tu contraseña">👁️</button>
                </div>
                <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
            </div>

            <button type="submit" class="btn-submit">Iniciar Sesión</button>
        </form>
        <footer class="form-footer">
            <p class="register-redirect">
                ¿Aún no estás en la web? <a href="register.html">Regístrate</a>
            </p>
        </footer>
    </main>
</body>
</html>
